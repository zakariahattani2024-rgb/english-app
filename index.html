<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Vocabulary Quiz</title>
<link rel="icon" href="icon.png" type="image/png">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cairo:wght@300;400;600;700&family=Oswald:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a40;
    --gold: #f0c060;
    --gold2: #e8a830;
    --cyan: #40d0e8;
    --rose: #f06080;
    --green: #50e0a0;
    --text: #e8e8f0;
    --muted: #8888aa;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(240,192,96,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,96,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: var(--gold); top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: var(--cyan); bottom: -50px; right: -50px; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* ---- HEADER ---- */
  header {
    text-align: center;
    padding: 40px 0 32px;
  }

  .logo-badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--gold) 0%, #fff 50%, var(--cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 1px;
  }

  /* ---- SETUP SCREEN ---- */
  #setup-screen {
    animation: fadeUp 0.6s ease both;
  }

  .setup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 32px 0;
  }

  @media (max-width: 500px) { .setup-grid { grid-template-columns: 1fr; } }

  .setup-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .setup-card h3 {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .option-btn {
    display: block;
    width: 100%;
    padding: 10px 16px;
    margin-bottom: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-align: right;
    transition: all 0.2s;
  }

  .option-btn:hover { border-color: var(--gold); color: var(--gold); }
  .option-btn.selected {
    background: rgba(240,192,96,0.12);
    border-color: var(--gold);
    color: var(--gold);
  }

  .start-btn {
    display: block;
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #0a0a0f;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    text-transform: uppercase;
    margin-top: 8px;
    transition: all 0.3s;
  }

  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(240,192,96,0.3); }

  /* ---- QUIZ SCREEN ---- */
  #quiz-screen { display: none; animation: fadeUp 0.5s ease both; }

  .quiz-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .stats-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-pill span:first-child { color: var(--gold); }

  .timer-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    color: var(--cyan);
    min-width: 70px;
    text-align: center;
  }

  .timer-pill.urgent { color: var(--rose); border-color: var(--rose); animation: pulse 0.5s infinite alternate; }

  @keyframes pulse { to { box-shadow: 0 0 16px var(--rose); } }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--cyan));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Question card */
  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--cyan), var(--rose));
  }

  .q-level {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .q-word {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 8vw, 4rem);
    font-weight: 900;
    color: #fff;
    margin-bottom: 8px;
    letter-spacing: -1px;
  }

  .q-phonetic {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 10px;
    font-style: italic;
  }

  .q-type-badge {
    display: inline-block;
    background: rgba(64,208,232,0.12);
    border: 1px solid rgba(64,208,232,0.3);
    color: var(--cyan);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 2px;
  }

  /* Choices */
  .choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  @media (max-width: 500px) { .choices-grid { grid-template-columns: 1fr; } }

  .choice-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: right;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: rgba(240,192,96,0.07);
    transform: translateY(-1px);
  }

  .choice-btn.correct {
    border-color: var(--green) !important;
    background: rgba(80,224,160,0.12) !important;
    color: var(--green) !important;
  }

  .choice-btn.wrong {
    border-color: var(--rose) !important;
    background: rgba(240,96,128,0.12) !important;
    color: var(--rose) !important;
  }

  .choice-btn:disabled { cursor: not-allowed; }

  /* Answer reveal */
  .answer-reveal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 20px;
    display: none;
    animation: fadeUp 0.4s ease both;
    text-align: right;
  }

  .answer-reveal.show { display: block; }

  .answer-reveal h4 {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .answer-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
  }

  .answer-item { flex: 1; min-width: 200px; }
  .answer-item label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; letter-spacing: 1px; }
  .answer-item p { font-size: 15px; color: var(--text); line-height: 1.5; }
  .answer-item p em { color: var(--cyan); font-style: normal; }

  .next-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #1a1a30, #252540);
    border: 1.5px solid var(--gold);
    color: var(--gold);
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    border-radius: 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    display: none;
  }

  .next-btn:hover { background: rgba(240,192,96,0.12); }
  .next-btn.show { display: block; }

  /* ---- RESULT SCREEN ---- */
  #result-screen { display: none; animation: fadeUp 0.6s ease both; text-align: center; }

  .result-hero {
    padding: 48px 32px 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .result-hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top, rgba(240,192,96,0.05), transparent 70%);
  }

  .result-emoji { font-size: 72px; margin-bottom: 16px; }

  .result-grade {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
  }

  .result-label {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .result-stats {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .res-stat {
    text-align: center;
  }

  .res-stat .val {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--text);
  }

  .res-stat .lbl {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .level-band {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }

  .level-band h3 {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .level-band p { color: var(--text); font-size: 15px; line-height: 1.6; }

  .replay-btn {
    display: inline-block;
    padding: 16px 48px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #0a0a0f;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    text-transform: uppercase;
    margin-top: 8px;
    transition: all 0.3s;
  }

  .replay-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(240,192,96,0.3); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .shine {
    animation: shineIn 0.8s ease both;
  }

  @keyframes shineIn {
    0% { opacity: 0; transform: scale(0.85); }
    60% { transform: scale(1.04); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* confetti dot */
  .confetti-dot {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    animation: confettiFall linear both;
    z-index: 999;
  }

  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <header>
    <div class="logo-badge">✦ English Master ✦</div>
    <h1>Vocabulary Quiz</h1>
    <p class="subtitle">اختبر مستواك في أكثر 2000 كلمة شيوعاً في اللغة الإنجليزية</p>
  </header>

  <!-- SETUP -->
  <div id="setup-screen">
    <div class="setup-grid">
      <div class="setup-card">
        <h3>عدد الأسئلة</h3>
        <button class="option-btn" onclick="select('q','10')">10 أسئلة — سريع</button>
        <button class="option-btn selected" onclick="select('q','20')">20 سؤال — متوسط</button>
        <button class="option-btn" onclick="select('q','30')">30 سؤال — شامل</button>
        <button class="option-btn" onclick="select('q','50')">50 سؤال — مكثف</button>
      </div>
      <div class="setup-card">
        <h3>الوقت لكل سؤال</h3>
        <button class="option-btn" onclick="select('t','0')">بدون مؤقت</button>
        <button class="option-btn selected" onclick="select('t','15')">15 ثانية</button>
        <button class="option-btn" onclick="select('t','30')">30 ثانية</button>
        <button class="option-btn" onclick="select('t','60')">دقيقة كاملة</button>
      </div>
    </div>
    <button class="start-btn" onclick="startQuiz()">ابدأ الاختبار ◀</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen">
    <div class="quiz-top">
      <div class="stats-row">
        <div class="stat-pill"><span>✓</span> <span id="score-display">0</span></div>
        <div class="stat-pill"><span>✗</span> <span id="wrong-display">0</span></div>
        <div class="stat-pill"><span>◆</span> <span id="qnum-display">1/20</span></div>
      </div>
      <div class="timer-pill" id="timer-display" style="display:none">--</div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="question-card">
      <div class="q-level" id="q-level">BEGINNER</div>
      <div class="q-word" id="q-word">WORD</div>
      <div class="q-phonetic" id="q-phonetic">/wɜːrd/</div>
      <div class="q-type-badge" id="q-type">MEANING</div>
    </div>

    <div class="choices-grid" id="choices-grid"></div>

    <div class="answer-reveal" id="answer-reveal">
      <h4>✦ الإجابة الكاملة</h4>
      <div class="answer-row">
        <div class="answer-item">
          <label>المعنى</label>
          <p id="a-meaning">—</p>
        </div>
        <div class="answer-item">
          <label>الضد (Antonym)</label>
          <p id="a-antonym">—</p>
        </div>
        <div class="answer-item" style="flex: 2;">
          <label>مثال (Example)</label>
          <p id="a-example">—</p>
        </div>
      </div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">التالي ◀</button>
  </div>

  <!-- RESULT -->
  <div id="result-screen">
    <div class="result-hero">
      <div class="result-emoji" id="r-emoji">🏆</div>
      <div class="result-grade" id="r-grade">85%</div>
      <div class="result-label" id="r-label">EXCELLENT</div>
      <div class="result-stats">
        <div class="res-stat"><div class="val" id="r-correct">0</div><div class="lbl">صحيح</div></div>
        <div class="res-stat"><div class="val" id="r-wrong">0</div><div class="lbl">خطأ</div></div>
        <div class="res-stat"><div class="val" id="r-total">0</div><div class="lbl">إجمالي</div></div>
      </div>
    </div>
    <div class="level-band" id="level-band">
      <h3>مستواك الآن</h3>
      <p id="level-desc">—</p>
    </div>
    <button class="replay-btn" onclick="resetQuiz()">إعادة الاختبار ↺</button>
  </div>
</div>

<script>
// ============================================================
// VOCABULARY DATABASE — 2000 most common English words (sample)
// ============================================================
const WORDS = [
  // A
  {w:"abandon",ph:"/əˈbændən/",lvl:"B1",mean:"يتخلى عن",ant:"keep / maintain",ex:"She had to <em>abandon</em> her car in the snow."},
  {w:"ability",ph:"/əˈbɪlɪti/",lvl:"A2",mean:"قدرة / موهبة",ant:"inability",ex:"He has the <em>ability</em> to speak five languages."},
  {w:"absent",ph:"/ˈæbsənt/",lvl:"A2",mean:"غائب",ant:"present",ex:"She was <em>absent</em> from school today."},
  {w:"accept",ph:"/əkˈsɛpt/",lvl:"A2",mean:"يقبل",ant:"refuse / reject",ex:"He <em>accepted</em> the job offer happily."},
  {w:"achieve",ph:"/əˈtʃiːv/",lvl:"B1",mean:"يحقق",ant:"fail",ex:"She worked hard to <em>achieve</em> her goals."},
  {w:"active",ph:"/ˈæktɪv/",lvl:"A2",mean:"نشيط / فعّال",ant:"passive / inactive",ex:"He stays <em>active</em> by running every day."},
  {w:"add",ph:"/æd/",lvl:"A1",mean:"يضيف",ant:"subtract / remove",ex:"Please <em>add</em> your name to the list."},
  {w:"afraid",ph:"/əˈfreɪd/",lvl:"A1",mean:"خائف",ant:"brave / fearless",ex:"She was <em>afraid</em> of the dark."},
  {w:"agree",ph:"/əˈɡriː/",lvl:"A2",mean:"يوافق",ant:"disagree",ex:"I <em>agree</em> with your decision."},
  {w:"alive",ph:"/əˈlaɪv/",lvl:"A2",mean:"حي",ant:"dead",ex:"The plant is still <em>alive</em>."},
  {w:"allow",ph:"/əˈlaʊ/",lvl:"A2",mean:"يسمح",ant:"forbid / deny",ex:"The teacher <em>allowed</em> them to leave early."},
  {w:"ancient",ph:"/ˈeɪnʃənt/",lvl:"B1",mean:"قديم جداً",ant:"modern / new",ex:"The <em>ancient</em> ruins are fascinating."},
  {w:"answer",ph:"/ˈɑːnsər/",lvl:"A1",mean:"إجابة / يجيب",ant:"question / ask",ex:"She gave the correct <em>answer</em>."},
  {w:"appear",ph:"/əˈpɪər/",lvl:"A2",mean:"يظهر",ant:"disappear / vanish",ex:"Stars <em>appear</em> at night."},
  {w:"arrive",ph:"/əˈraɪv/",lvl:"A1",mean:"يصل",ant:"depart / leave",ex:"The train will <em>arrive</em> at noon."},
  {w:"ask",ph:"/ɑːsk/",lvl:"A1",mean:"يسأل",ant:"answer / reply",ex:"She <em>asked</em> for help."},
  {w:"asleep",ph:"/əˈsliːp/",lvl:"A2",mean:"نائم",ant:"awake",ex:"The baby fell <em>asleep</em> quickly."},
  {w:"attack",ph:"/əˈtæk/",lvl:"B1",mean:"يهاجم / هجوم",ant:"defend / retreat",ex:"The lion will <em>attack</em> its prey."},
  {w:"awful",ph:"/ˈɔːfəl/",lvl:"A2",mean:"فظيع / مريع",ant:"wonderful / great",ex:"The weather was <em>awful</em> yesterday."},
  // B
  {w:"beautiful",ph:"/ˈbjuːtɪfəl/",lvl:"A1",mean:"جميل",ant:"ugly",ex:"The sunset was <em>beautiful</em>."},
  {w:"begin",ph:"/bɪˈɡɪn/",lvl:"A1",mean:"يبدأ",ant:"end / finish",ex:"Let's <em>begin</em> the lesson."},
  {w:"believe",ph:"/bɪˈliːv/",lvl:"A2",mean:"يعتقد / يؤمن",ant:"doubt / disbelieve",ex:"I <em>believe</em> you can do it."},

// Generate choices
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Settings
let settings = { q: 20, t: 15 };
let questions = [];
let current = 0;
let score = 0;
let wrongs = 0;
let timerInterval = null;
let timeLeft = 0;
let answered = false;

function select(type, val) {
  settings[type] = parseInt(val);
  const btns = document.querySelectorAll(`.setup-card:${type === 'q' ? 'nth-child(1)' : 'nth-child(2)'} .option-btn`);
  btns.forEach(b => {
    b.classList.toggle('selected', b.textContent.startsWith(val === '0' ? 'بدون' : val));
  });
}

// Fix select buttons properly
document.querySelectorAll('.setup-card').forEach((card, ci) => {
  card.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      card.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
});

function startQuiz() {
  const pool = shuffle([...WORDS]).slice(0, settings.q);
  questions = pool.map(word => {
    // Make wrong choices from other words
    const others = shuffle(WORDS.filter(w => w !== word)).slice(0, 3);
    const choices = shuffle([word.mean, ...others.map(o => o.mean)]);
    return { word, correct: word.mean, choices };
  });
  current = 0; score = 0; wrongs = 0; answered = false;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;

  document.getElementById('qnum-display').textContent = `${current + 1}/${total}`;
  document.getElementById('score-display').textContent = score;
  document.getElementById('wrong-display').textContent = wrongs;
  document.getElementById('progress-bar').style.width = `${(current / total) * 100}%`;

  document.getElementById('q-level').textContent = q.word.lvl;
  document.getElementById('q-word').textContent = q.word.w.toUpperCase();
  document.getElementById('q-phonetic').textContent = q.word.ph;
  document.getElementById('q-type').textContent = 'ما معنى هذه الكلمة؟';

  // Choices
  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  q.choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = ch;
    btn.onclick = () => answer(btn, ch, q);
    grid.appendChild(btn);
  });

  document.getElementById('answer-reveal').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');

  // Timer
  if (settings.t > 0) {
    const timerEl = document.getElementById('timer-display');
    timerEl.style.display = 'block';
    timeLeft = settings.t;
    timerEl.textContent = timeLeft;
    timerEl.classList.remove('urgent');
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timeLeft--;
      timerEl.textContent = timeLeft;
      if (timeLeft <= 5) timerEl.classList.add('urgent');
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        if (!answered) timeOut(q);
      }
    }, 1000);
  } else {
    document.getElementById('timer-display').style.display = 'none';
  }
}

function answer(btn, choice, q) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === q.correct) b.classList.add('correct');
  });

  if (choice === q.correct) {
    score++;
    btn.classList.add('correct');
  } else {
    wrongs++;
    btn.classList.add('wrong');
  }

  document.getElementById('score-display').textContent = score;
  document.getElementById('wrong-display').textContent = wrongs;

  showReveal(q);
}

function timeOut(q) {
  answered = true;
  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    if (b.textContent === q.correct) b.classList.add('correct');
  });
  wrongs++;
  document.getElementById('wrong-display').textContent = wrongs;
  showReveal(q);
}

function showReveal(q) {
  document.getElementById('a-meaning').textContent = q.word.mean;
  document.getElementById('a-antonym').textContent = q.word.ant;
  document.getElementById('a-example').innerHTML = q.word.ex;
  document.getElementById('answer-reveal').classList.add('show');
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  clearInterval(timerInterval);
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('r-grade').textContent = pct + '%';
  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-wrong').textContent = wrongs;
  document.getElementById('r-total').textContent = total;

  let emoji, label, desc;
  if (pct >= 90) {
    emoji = '🏆'; label = 'OUTSTANDING';
    desc = 'مستوى ممتاز جداً! أنت تتحكم في المفردات الإنجليزية بشكل رائع. استمر في القراءة والكتابة للوصول للاحتراف الكامل.';
  } else if (pct >= 75) {
    emoji = '⭐'; label = 'EXCELLENT';
    desc = 'مستوى ممتاز! معرفتك بالمفردات قوية جداً. ركز على الكلمات التي أخطأت فيها وستصل للقمة قريباً.';
  } else if (pct >= 60) {
    emoji = '👍'; label = 'GOOD';
    desc = 'مستوى جيد! لديك أساس قوي. تدرّب يومياً على الكلمات الجديدة واستخدمها في جمل حقيقية.';
  } else if (pct >= 40) {
    emoji = '📚'; label = 'AVERAGE';
    desc = 'مستوى متوسط. لا تستسلم! خصص 20 دقيقة يومياً لحفظ كلمات جديدة وستلاحظ تقدماً سريعاً.';
  } else {
    emoji = '💪'; label = 'KEEP GOING';
    desc = 'أنت في البداية وهذا رائع! كل خبير كان يوماً مبتدئاً. ابدأ بحفظ 10 كلمات يومياً وكرر هذا الاختبار.';
  }

  document.getElementById('r-emoji').textContent = emoji;
  document.getElementById('r-label').textContent = label;
  document.getElementById('level-desc').textContent = desc;

  if (pct >= 75) spawnConfetti();
}

function spawnConfetti() {
  const colors = ['#f0c060','#40d0e8','#f06080','#50e0a0','#a080f0'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const d = document.createElement('div');
      d.className = 'confetti-dot';
      d.style.left = Math.random() * 100 + 'vw';
      d.style.background = colors[Math.floor(Math.random() * colors.length)];
      d.style.animationDuration = (2 + Math.random() * 2) + 's';
      d.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 4000);
    }, i * 30);
  }
}

function resetQuiz() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';
}
</script>
